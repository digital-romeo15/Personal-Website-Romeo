<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills – Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        :root {
            --bg-dark: #0d0f16;
            --card-dark: #161a23;
            --accent: #4f7cff;
            --text-light: #ffffff;
            --text-muted: #b8bcd1;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: var(--text-light);
            font-family: "Poppins", sans-serif;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
            background: transparent;
        }
        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .skill-card {
            background: var(--card-dark);
            padding: 25px;
            border-radius: 18px;
            border: 1px solid #20242f;
            transition: transform 0.3s, border 0.3s;
            opacity: 0;
            transform: translateY(40px);
        }

        .skill-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .skill-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .skill-bar {
            height: 10px;
            width: 100%;
            background: #222733;
            border-radius: 50px;
            overflow: hidden;
            margin-top: 10px;
        }

        .skill-level {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1.2s;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
        <div class="title">My Skills</div>
        <div class="subtitle">A breakdown of my technical strengths and tools I work with.</div>

      
      <!---HTML and CSS skills -->
        <div class="skills-grid">
            
            <div class="skill-card" data-level="75">
                <div class="skill-name">GitHub Framework and Tools</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>

            <div class="skill-card" data-level="95">
                <div class="skill-name">HTML & CSS</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>

             <!---JavaScript skills -->
            <div class="skill-card" data-level="80">
                <div class="skill-name">JavaScript</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>


             <!---PHP skills -->
            <div class="skill-card" data-level="65">
                <div class="skill-name">PHP Backend</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>


             <!---SQL and Database skills -->
            <div class="skill-card" data-level="80">
                <div class="skill-name">MySQL & Databases</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>


             <!---Python skills -->
            <div class="skill-card" data-level="40">
                <div class="skill-name">Python (Beginner)</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>


             <!---Java skills -->
            <div class="skill-card" data-level="85">
                <div class="skill-name">Java</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>


             <!---Graphic Design skills -->
              <div class="skill-card" data-level="80">
                <div class="skill-name">Graphic Design</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>

            <div class="skill-card" data-level="45">    <!--Android Dev card-->
                <div class="skill-name">Android Development(Kotlin)</div>
                <div class="skill-bar"><div class="skill-level"></div></div>
            </div>
        </div>
    </div>

    <script>
        // Fade + slide-in animation
        const cards = document.querySelectorAll('.skill-card');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    const level = entry.target.getAttribute('data-level');
                    entry.target.querySelector('.skill-level').style.width = level + '%';
                }
            });
        }, { threshold: 0.2 });

        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
